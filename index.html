<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Festivite</title>
  
  <link rel="stylesheet" href="/styles/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Leckerli+One&family=Open+Sans:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <main>
      <div class="main-container">
        <header class="logo">
          <img src="assets/Logo.svg" alt="imagem de uma serpentina">
          <h2>Festivite</h2>
          <p>Crie um convite digital para o seu evento</p>
        </header>
      </div>
    </main>

    <aside>
      <div class="aside-container"> 
        <h1>Crie seu convite</h1>

        <form>
          <fieldset class="invite-info">
            <legend><img src="assets/icons/calendar.svg" alt="icone de calendario">Sobre o evento
            </legend>

            <div class="input-wrapper">
              <label for="title">Título</label>
              <input id="title" type="text" name="title" placeholder="Nome do evento">
            </div>

            <div class="date-wrapper">
              <label for="initiation">Início</label>
              <input id="initiation" type="datetime-local" name="initiation" >
            </div>

            <div class="date-wrapper">
              <label for="finish">Fim</label>
              <input id="finish" type="datetime-local" name="finish" >
            </div>

            <div class="button-wrapper">
              <label for="kind">Tipo</label>

              <div class="btn-wrapper">
                <input class="kind-button presencial" type="button" name="kind" value="Presencial" >
                <input class="kind-button online" type="button" name="kind" value="Online" >
              </div>
            </div>

            <div class="place-wrapper">
              <label for="place">Local</label>
              <input id="place" type="text" name="place" placeholder="Link ou endereço">
            </div>

            <div class="textarea-wrapper">
               <label for="description">Descrição</label>
               <textarea name="description" id="description" cols="60" rows="5" placeholder="Escreva sobre os detalhes do evento"></textarea>
            </div>

          </fieldset>

          <fieldset class="customization">
            <legend><img src="assets/icons/paintbrush-vertical.svg" alt="ícone de um pincel">Personalização</legend>

            <h3 class="paragrafos">Cor principal</h3>

             <div class="radio-wrapper">
              <label class="custom-radio">
                <input type="radio" name="option" value="1">
                <span class="radio-mark blue"></span>
              </label>

              <label class="custom-radio">
                <input type="radio" name="option" value="2">
                <span class="radio-mark navy"></span>
              </label>
              
              <label class="custom-radio">
                <input type="radio" name="option" value="3">
                <span class="radio-mark purple"></span>
              </label>
              
              <label class="custom-radio">
                <input type="radio" name="option" value="4">
                <span class="radio-mark fuschia"></span>
              </label>

              <label class="custom-radio">
                <input type="radio" name="option" value="5">
                <span class="radio-mark pink"></span>
              </label>
              
              <label class="custom-radio">
                <input type="radio" name="option" value="6">
                <span class="radio-mark danger"></span>
              </label>
              
              <label class="custom-radio">
                <input type="radio" name="option" value="7">
                <span class="radio-mark orange"></span>
              </label>

              <label class="custom-radio">
                <input type="radio" name="option" value="8">
                <span class="radio-mark yellow"></span>
              </label>

              <label class="custom-radio">
                <input type="radio" name="option" value="9">
                <span class="radio-mark lime"></span>
              </label>

              <label class="custom-radio">
                <input type="radio" name="option" value="10">
                <span class="radio-mark green"></span>
              </label>

              <label class="custom-radio">
                <input type="radio" name="option" value="11">
                <span class="radio-mark cyan "></span>
              </label>
          
            </div>
          </fieldset>

            <h3 class="paragrafos">Tema do evento</h3>

          <fieldset class="theme-info">
            <div class="themeselection ">
              <label>
                <input type="radio" name="tema" value="aniversario">
                <img src="assets/images/aniversario.png" alt="um bolo de aniversario">
                Aniversário
              </label>
            </div>

            <div class="themeselection">
             <label>
               <input type="radio" name="tema" value="aniversario">
                <img src="assets/images/infantil.png" alt="diversos adereços para festa infantil">
                Infantil
              </label>
            </div>

            <div class="themeselection">
             <label>
               <input type="radio" name="tema" value="aniversario">
                <img src="assets/images/Formatura.png" alt="roupas de Formatura">
                Formatura
            </label>
            </div>

            <div class="themeselection">
             <label>
               <input type="radio" name="tema" value="aniversario">
                <img src="assets/images/casamento.png" alt="alianças de casamento">
                Casamento
            </label>
            </div>

            <div class="themeselection">
              <label>
                 <input type="radio" name="tema" value="aniversario">
                  <img src="assets/images/chá de bebê.png" alt="imagem de flores e lenços úmidecidos">
                  Chá de bebê
              </label>
              </div>

              <div class="themeselection">
              <label>
                 <input type="radio" name="tema" value="aniversario">
                  <img src="assets/images/chá de panela.png" alt="imagem de panelas">
                  Chá de panela
              </label>
              </div>

              <div class="themeselection">
              <label>
                 <input type="radio" name="tema" value="aniversario">
                  <img src="assets/images/carnaval.png" alt="imagem de serpentinas">
                  Carnaval
              </label>
              </div>

              <div class="themeselection">
              <label>
                 <input type="radio" name="tema" value="aniversario">
                  <img src="assets/images/páscoa.png" alt="ovo de páscoa">
                  Páscoa
              </label>
              </div>

              <div class="themeselection">
              <label>
                 <input type="radio" name="tema" value="aniversario">
                  <img src="assets/images/são joão.png" alt="bandeirinhas de são joão">
                  São joão
              </label>
              </div>

              <div class="themeselection">
              <label>
                 <input type="radio" name="tema" value="aniversario">
                  <img src="assets/images/hallowen.png" alt="aboboras de hallowen">
                  Hallowen
              </label>
              </div>

              <div class="themeselection">
              <label>
                 <input type="radio" name="tema" value="aniversario">
                  <img src="assets/images/natal.png" alt="imagem de presentes de natal">
                Natal 
              </label>
              </div>

              <div class="themeselection">
                <label>
                  <input type="radio" name="tema" value="aniversario">
                    <img src="assets/images/outro.png" alt="imagem de pessoas a festejar">
                    Outro
                </label>
              </div>
            </div>

            <div class="upload">

              <div class="switch-container">
                <label for="toggle">Estilo</label>
                <div class="switchtoggle">
                  <input id="toggle" type="button" name="toggle">
                  <span>Escuro</span>
                </div>
              </div>

              <div class="btn">   
                <label for="kind">Foto de capa</label>
                <div class="btn-wrapper">
                    <input id="kind" class="kind-button selection" type="button" name="kind"  value="Selecionar" >
                    <span>Nenhum arquivo selecionado</span>
                </div>
              </div>
            </div>

          </fieldset>


        </form>
      </div>
    </aside>
  </div>
</body>
</html>
