<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Festivite</title>
  
  <link rel="stylesheet" href="/styles/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Leckerli+One&family=Open+Sans:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <main>
      <div class="main-container">
        <header class="logo">
          <img src="assets/Logo.svg" alt="imagem de uma serpentina">
          <h2>Festivite</h2>
          <p>Crie um convite digital para o seu evento</p>
        </header>
      </div>
    </main>

    <aside>
      <div class="aside-container"> 
        <h1>Crie seu convite</h1>
        <div class="invite">
         <img src="assets/icons/calendar.svg" alt="icone de calendario">
         <h3>Sobre o evento</h3>
        </div>
      </div>
    </aside>
  </div>
</body>
</html>
