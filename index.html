<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Festivite</title>
  
  <link rel="stylesheet" href="/styles/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Leckerli+One&family=Open+Sans:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <main>
      <div class="main-container">
        <header class="logo">
          <img src="assets/Logo.svg" alt="imagem de uma serpentina">
          <h2>Festivite</h2>
          <p>Crie um convite digital para o seu evento</p>
        </header>
      </div>
    </main>

    <aside>
      <div class="aside-container"> 
        <h1>Crie seu convite</h1>

        <form>
          <fieldset class="invite-info">
            <legend><img src="assets/icons/calendar.svg" alt="icone de calendario">Sobre o evento
            </legend>

            <div class="input-wrapper">
              <label for="title">Título</label>
              <input id="title" type="text" name="title" placeholder="Nome do evento">
            </div>

            <div class="date-wrapper">
              <label for="initiation">Início</label>
              <input id="initiation" type="datetime-local" name="initiation" >
            </div>

            <div class="date-wrapper">
              <label for="finish">Fim</label>
              <input id="finish" type="datetime-local" name="finish" >
            </div>

            <div class="button-wrapper">
              <label for="kind">Tipo</label>

              <div class="btn-wrapper">
                <input class="kind-button presencial" type="button" name="kind" value="Presencial" >
                <input class="kind-button online" type="button" name="kind" value="Online" >
              </div>
            </div>

            <div class="place-wrapper">
              <label for="place">Local</label>
              <input id="place" type="text" name="place" placeholder="Link ou endereço">
            </div>

            <div class="textarea-wrapper">
               <label for="description">Descrição</label>
               <textarea name="description" id="description" cols="60" rows="5" placeholder="Escreva sobre os detalhes do evento"></textarea>
            </div>

          </fieldset>

          <fieldset class="customization">
            <legend><img src="assets/icons/paintbrush-vertical.svg" alt="ícone de um pincel">Personalização</legend>

             <div class="radio-wrapper">
              <label class="custom-radio">
                <input type="radio" name="option" value="1">
                <span class="radio-mark blue"></span>
              </label>

              <label class="custom-radio">
                <input type="radio" name="option" value="2">
                <span class="radio-mark navy"></span>
              </label>
              
              <label class="custom-radio">
                <input type="radio" name="option" value="3">
                <span class="radio-mark purple"></span>
              </label>
              
              <label class="custom-radio">
                <input type="radio" name="option" value="4">
                <span class="radio-mark fuschia"></span>
              </label>

              <label class="custom-radio">
                <input type="radio" name="option" value="5">
                <span class="radio-mark pink"></span>
              </label>
              
              <label class="custom-radio">
                <input type="radio" name="option" value="6">
                <span class="radio-mark danger"></span>
              </label>
              
              <label class="custom-radio">
                <input type="radio" name="option" value="7">
                <span class="radio-mark orange"></span>
              </label>

              <label class="custom-radio">
                <input type="radio" name="option" value="8">
                <span class="radio-mark yellow"></span>
              </label>

              <label class="custom-radio">
                <input type="radio" name="option" value="9">
                <span class="radio-mark lime"></span>
              </label>

              <label class="custom-radio">
                <input type="radio" name="option" value="10">
                <span class="radio-mark green"></span>
              </label>

              <label class="custom-radio">
                <input type="radio" name="option" value="11">
                <span class="radio-mark cyan "></span>
              </label>
          
            </div>
          </fieldset>

          <fieldset class="theme-info">
            <legend>Tema do evento</legend>

            <div class="themeselection">
              <label>
                <img src="assets/images/aniversario.png" alt="">
                Aniversário
            </label>

             <label>
                <img src="assets/images/aniversario.png" alt="">
                Aniversário
            </label>
            </div>
          </fieldset>
        </form>
      </div>
    </aside>
  </div>
</body>
</html>
